# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch: {}

name: altdoc

jobs:
  rwasmbuild:
    concurrency:
      group: altdoc-webr-${{ github.event_name != 'pull_request' || github.run_id }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: write

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/r-wasm/webr:v0.5.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable pak and rwasm
        run: |
          install.packages(
            "pak",
            repos = "https://cloud.r-project.org"
          )

          pak::pak(
            "r-wasm/rwasm",
            upgrade = FALSE
          )
        shell: Rscript {0}

      - name: Build WASM R packages
        run: |
          dir.create("_site", showWarnings = FALSE, recursive = TRUE)

          rwasm::add_pkg(
            ".",
            repo_dir = "_site",
            dependencies = FALSE,
            compress = FALSE
          )

          rwasm::make_vfs_library(
            out_dir = ".",
            repo_dir = "_site",
            strip = NULL,
            compress = FALSE
          )
        shell: Rscript {0}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rwasmrepo
          path: |
            _site
            library.data
            library.js.metadata
          retention-days: 1

  altdoc:
    runs-on: ubuntu-latest

    needs: rwasmbuild

    environment:
      name: github-pages

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      repository-projects: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.40"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies without pak
        run: |
          install.packages(
            c("remotes", "pkgload", "pkgdown", "altdoc"),
            repos = "https://cloud.r-project.org"
          )

          remotes::install_github(
            "ropensci-org/rotemplate",
            upgrade = "never"
          )

          remotes::install_deps(
            dependencies = c("Depends", "Imports", "LinkingTo", "Suggests"),
            upgrade = "never"
          )

          install.packages(".", repos = NULL, type = "source")
        shell: Rscript {0}

      - name: Grab tagged versions of Quarto Extensions
        run: |
          cd altdoc
          quarto add --no-prompt coatless/quarto-webr@0.4.3
          quarto add --no-prompt coatless-quarto/panelize@0.0.2
          cd ../

      - name: Build site
        run: |
          pkgload::load_all()
          altdoc::render_docs(
            verbose = TRUE,
            parallel = FALSE,
            freeze = FALSE
          )
        shell: Rscript {0}

      - name: Copy to new directory
        run: |
          mkdir -p _site
          cp -r *quarto/*site/* _site/

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: rwasmrepo
          path: _site
          merge-multiple: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
